version: '3.8'

services:


  mysql_principal:
    container_name: mysql_principal
    image: mysql:8.0
    ports:
      - "3306:3306"
    command: >
      --server-id=1
      --log-bin=mysql-bin
      --binlog-do-db=informacion
      --log-slave-updates=ON
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: informacion
    volumes:
      - principal_datos:/var/lib/mysql


  mysql_secundario:
    container_name: mysql_secundario
    image: mysql:8.0
    ports:
      - "3307:3306"
    command: >
      --server-id=2
      --log-bin=mysql-bin
      --binlog-do-db=informacion
      --relay-log=mysql-relay-bin
      --log-slave-updates=ON
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: informacion
    volumes:
      - secundario_datos:/var/lib/mysql
    depends_on:
      - mysql_principal


  nodo1:
    container_name: nodo1
    build: .
    environment:
      DB_HOST: mysql_principal
      NODO_NAME: "Nodo 1"
    depends_on:
      - mysql_principal


  nodo2:
    container_name: nodo2
    build: .
    environment:
      DB_HOST: mysql_secundario
      NODO_NAME: "Nodo 2"
    depends_on:
      - mysql_secundario


  nginx:
    container_name: nginx_balancer
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - nodo1
      - nodo2


  phpmyadmin:
    container_name: phpmyadmin
    image: phpmyadmin:latest
    ports:
      - "8080:80"
    environment:
      PMA_HOSTS: "mysql_principal,mysql_secundario"
      PMA_ARBITRARY: 1
    depends_on:
      - mysql_principal
      - mysql_secundario

volumes:
  principal_datos:
  secundario_datos:
